name: Web CI

# Builds and unit-tests the Vue web app. Scoped to web/ so it stays independent of the C# workflows.
on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: web

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
